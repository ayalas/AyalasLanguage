user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 4096;

    include /etc/nginx/conf.d/*.conf;

    # 1. HTTP Server - Redirects all traffic to HTTPS, except Let's Encrypt challenges
    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  localhost;

        # Critical for Let's Encrypt Automated Domain Validation
        location /.well-known/acme-challenge/ {
            root /var/app/current/public;
        }

        # Global Redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. HTTPS Server - Reverse Proxy to your .NET App
    server {
        listen       443 ssl default_server;
        listen       [::]:443 ssl default_server;
        server_name  localhost;
        root         /var/app/current;

        # Paths where Certbot drops the generated SSL keys
        ssl_certificate      /etc/letsencrypt/live/ayalasapp.duckdns.org/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/ayalasapp.duckdns.org/privkey.pem;

        ssl_session_timeout  5m;
        ssl_protocols  TLSv1.2 TLSv1.3;
        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers   on;

        include /etc/nginx/default.d/*.conf;

        location / {
            proxy_pass         http://localhost:5000;
            proxy_http_version 1.1;
            
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection keep-alive;
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            client_max_body_size 10M;
        }
    }
}