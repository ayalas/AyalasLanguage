user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

# Load dynamic modules.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 4096;

    # Include Elastic Beanstalk default configuration adjustments
    include /etc/nginx/conf.d/*.conf;

    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  localhost;
        root         /var/app/current;

        # Include Elastic Beanstalk health check configurations if present
        include /etc/nginx/default.d/*.conf;

        location / {
            proxy_pass         http://localhost:5000;
            proxy_http_version 1.1;
            
            # Necessary headers for SignalR, WebSockets, and identity tokens
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection keep-alive;
            
            # Crucial headers for ASP.NET Core to identify real client IPs and schemas
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Optional: Increase limits if your app handles larger file/image uploads
            client_max_body_size 10M;
        }

        error_page 404 /404.html;
        location = /404.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }
}